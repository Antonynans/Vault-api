version: '3.9'

services:
  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: builder        # use builder stage in dev for hot-reload
    command: npm run start:dev
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: fintech_db
      JWT_SECRET: dev_jwt_secret_change_in_production_32chars
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_production
      JWT_REFRESH_EXPIRES_IN: 7d
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 30
    volumes:
      - ./src:/app/src               # live-reload source
      - ./database:/app/database
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fintech-net

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fintech_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fintech-net

  # ── pgAdmin (optional dev UI) ─────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fintech.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - fintech-net
    profiles:
      - tools  # only starts with: docker compose --profile tools up

volumes:
  postgres_data:

networks:
  fintech-net:
    driver: bridge
